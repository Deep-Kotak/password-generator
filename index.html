<!DOCTYPE html>
<html>

<head>

    <title>Password Generator</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>🔐 Password Generator</h1>

    <div class="generator-box">

        <input
            type="text"
            id="password"
            placeholder="Click Generate Password"
            readonly>

        <button id="copyBtn">
            Copy Password
        </button>

        <p id="strength" class="strength">
    Strength: -
</p>

<p id="copyMessage"></p>

        <div class="length-box">

            <label>
                Password Length:
                <span id="lengthValue">12</span>
            </label>

            <input
                type="range"
                id="lengthSlider"
                min="8"
                max="32"
                value="12">

        </div>

        <div class="options">

            <div class="count-box">

    <label>
        Number of Passwords
    </label>

    <select id="passwordCount">

        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>

    </select>

</div>

            <label>
                <input
                    type="checkbox"
                    id="uppercase"
                    checked>
                Uppercase
            </label>

            <label>
                <input
                    type="checkbox"
                    id="lowercase"
                    checked>
                Lowercase
            </label>

            <label>
                <input
                    type="checkbox"
                    id="numbers"
                    checked>
                Numbers
            </label>

            <label>
                <input
                    type="checkbox"
                    id="symbols"
                    checked>
                Symbols
            </label>

        </div>

        <div class="multi-passwords">

    <h3>Generated Passwords</h3>

    <ul id="passwordHistory"></ul>

</div>

        <button id="generateBtn">
            Generate Password
        </button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
