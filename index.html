<!DOCTYPE html>
<html>

<head>

    <title>Password Generator</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <h1>🔐 Password Generator</h1>

  <input
    type="text"
    id="password"
    placeholder="Click Generate Password"
    readonly>

<div class="length-box">

    <label>
        Password Length:
        <span id="lengthValue">12</span>
    </label>

    <input
        type="range"
        id="lengthSlider"
        min="8"
        max="32"
        value="12">

</div>

<div class="options">

    <label>
        <input type="checkbox"
               id="uppercase"
               checked>
        Uppercase
    </label>

    <label>
        <input type="checkbox"
               id="lowercase"
               checked>
        Lowercase
    </label>

    <label>
        <input type="checkbox"
               id="numbers"
               checked>
        Numbers
    </label>

    <label>
        <input type="checkbox"
               id="symbols"
               checked>
        Symbols
    </label>

</div>

<button id="generateBtn">
    Generate Password
</button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
